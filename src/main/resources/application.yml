server.port: 8087

spring.mvc.pathmatch.matching-strategy:  ANT_PATH_MATCHER
spring.mvc.throw-exception-if-no-handler-found: true
spring.resources.add-mappings: false

# Demo - generic external call
services.demo.uri.internal: http://gaia-x.demo.local:8081

springfox:
  documentation:
    swaggerUi:
      baseUrl: /api/discovery
    openApi:
      v3:
        path: /api/discovery/v3/api-docs
    swagger:
      v2:
        path: /api/discovery/v2/api-docs
---
spring.config.activate.on-profile: mesh
server.port: 80
server.shutdown: graceful
spring.lifecycle.timeout-per-shutdown-phase: 10s
management.endpoint.health.probes.enabled: true
management.endpoints.web.exposure.include: "*"
management.server.port: 4004

services.demo.uri.internal: http://demo